<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mesa do Mestre - V48</title>
    <link rel="stylesheet" href="./css/tema-maritimo-sombrio.css?v=48">
  <style>
    :root{
      --bg:#170d07;
      --panel:#f2dfb7;
      --panel2:#fff5df;
      --ink:#241407;
      --muted:#6b5132;
      --line:#7b542d;
      --gold:#b9822e;
      --red:#8b2f28;
      --green:#4c7030;
      --blue:#38566d;
      --shadow:0 14px 34px rgba(0,0,0,.26);
      --r:18px;
      --font:"Trebuchet MS", system-ui, sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:var(--font);
      color:var(--ink);
      background:
        radial-gradient(circle at 20% 0%, rgba(217,172,95,.18), transparent 30%),
        linear-gradient(90deg,#120904,#301b0c 50%,#120904);
      padding-bottom:76px;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .app{max-width:1180px;margin:0 auto;padding:10px;display:grid;gap:10px}
    .topbar{
      position:sticky;top:0;z-index:10;
      display:grid;gap:8px;
      background:linear-gradient(180deg,rgba(23,13,7,.96),rgba(23,13,7,.82));
      padding:8px 0 10px;
      backdrop-filter: blur(8px);
    }
    .brand-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
    .brand h1{margin:0;color:#ffe2aa;font-size:18px;line-height:1.1}
    .brand small{display:block;color:#d0b177;font-weight:800;font-size:11px;margin-top:2px}
    .auth{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:6px}
    .auth input{
      min-height:42px;border-radius:14px;border:1px solid #9b713f;background:#fff3d7;
      padding:8px 10px;color:#1e1208;font-weight:900;
    }
    .btn{
      border:0;border-radius:14px;min-height:40px;padding:8px 11px;font-weight:950;
      background:#e1bd76;color:#201207;box-shadow:inset 0 1px 0 rgba(255,255,255,.45);
    }
    .btn.primary{background:linear-gradient(180deg,#ffd07b,#b67822)}
    .btn.green{background:linear-gradient(180deg,#95bd66,#4e7830);color:#fff}
    .btn.red{background:linear-gradient(180deg,#c85b50,#8a2c25);color:#fff}
    .btn.blue{background:linear-gradient(180deg,#6f91aa,#38566d);color:#fff}
    .btn.ghost{background:#fff4dc;border:1px solid rgba(36,20,7,.22)}
    .btn.small{min-height:32px;border-radius:11px;padding:5px 8px;font-size:12px}
    .pill{display:inline-flex;align-items:center;gap:4px;border:1px solid rgba(36,20,7,.18);border-radius:999px;padding:4px 7px;background:#fff4dc;font-size:11px;font-weight:900;color:#5c3f20}
    .panel{
      background:linear-gradient(180deg,var(--panel2),var(--panel));
      border:2px solid var(--line);
      border-radius:var(--r);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.5);
      padding:10px;
      overflow:hidden;
    }
    .panel h2,.panel h3{margin:0 0 8px;text-align:center;letter-spacing:.03em}
    .screen{display:none;gap:10px}
    .screen.active{display:grid}
    .now-card{
      display:grid;gap:8px;background:linear-gradient(180deg,#4b2b14,#2b1508);color:#ffe8bd;
      border-color:#d0a15a;
    }
    .now-title{font-size:11px;text-transform:uppercase;color:#d4ad66;font-weight:950;letter-spacing:.08em}
    .now-name{font-size:23px;font-weight:950;line-height:1.1}
    .now-sub{font-size:12px;color:#f0cf99;font-weight:850}
    .status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .stat{background:rgba(255,244,220,.12);border:1px solid rgba(255,226,170,.22);border-radius:12px;padding:7px;text-align:center}
    .stat span{display:block;font-size:10px;color:#d7b77f;text-transform:uppercase;font-weight:950}
    .stat b{font-size:18px;color:#fff0cb}
    .quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .hp-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .hpbar{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}
    .track{height:11px;background:#d7c096;border:1px solid rgba(36,20,7,.25);border-radius:999px;overflow:hidden}
    .fill{height:100%;background:linear-gradient(90deg,#608f39,#a9ca67)}
    .fill.low{background:linear-gradient(90deg,#b9822e,#e3bd59)}
    .fill.dead{background:linear-gradient(90deg,#7e2823,#c8584d)}
    .toolbar{display:grid;grid-template-columns:1fr auto auto;gap:6px;align-items:center}
    .toolbar input,.toolbar select,.field input,.field select,.field textarea{
      width:100%;min-height:38px;border-radius:12px;border:1px solid rgba(36,20,7,.25);
      background:#fff8ea;padding:7px 9px;color:#241407;font-weight:850;
    }
    .field label{display:block;font-size:11px;text-transform:uppercase;color:#674b2b;font-weight:950;margin-bottom:4px}
    .list{display:grid;gap:7px}
    .entity-card{
      border:1px solid rgba(36,20,7,.22);background:rgba(255,250,240,.68);border-radius:14px;padding:8px;
      display:grid;gap:6px;
    }
    .entity-card.active{outline:3px solid rgba(185,130,46,.55)}
    .entity-card.dead{opacity:.62}
    .entity-top{display:grid;grid-template-columns:44px 1fr auto;gap:8px;align-items:center}
    .avatar{width:44px;height:44px;border-radius:13px;background:#d6bd8d;border:1px solid rgba(36,20,7,.22);display:grid;place-items:center;overflow:hidden;font-size:10px;text-align:center;font-weight:900;color:#674b2b}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .entity-name{font-weight:950;font-size:15px;line-height:1.1}
    .entity-sub{font-size:11px;color:#6b5132;font-weight:850;margin-top:2px}
    .entity-mini{display:flex;flex-wrap:wrap;gap:4px}
    .entity-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
    .turn-list{display:grid;gap:6px}
    .turn-item{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:center;padding:7px;border:1px solid rgba(36,20,7,.2);border-radius:12px;background:#fff6e4}
    .turn-item.active{background:#ffe4a9;border-color:#b9822e}
    .turn-rank{width:28px;height:28px;border-radius:10px;background:#70491f;color:#fff;display:grid;place-items:center;font-weight:950}
    .conditions{display:flex;gap:6px;flex-wrap:wrap}
    .cond{border:1px solid rgba(36,20,7,.22);background:#fff3d5;border-radius:999px;padding:7px 9px;font-size:12px;font-weight:950}
    .cond.active{background:#8b2f28;color:#fff;border-color:#8b2f28}
    .detail-grid{display:grid;gap:10px}
    .detail-head{display:grid;grid-template-columns:64px 1fr;gap:10px;align-items:center}
    .detail-head .avatar{width:64px;height:64px;border-radius:18px}
    .detail-name{font-size:22px;font-weight:950}
    .detail-sub{font-size:12px;color:#6b5132;font-weight:850}
    .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .spell-list,.notes-list{display:grid;gap:5px;max-height:240px;overflow:auto}
    .spell{border:1px solid rgba(36,20,7,.18);border-radius:12px;background:#fff8ea;padding:7px;font-size:12px;font-weight:850}
    .bottom-nav{
      position:fixed;left:0;right:0;bottom:0;z-index:30;
      background:linear-gradient(180deg,rgba(23,13,7,.92),#170d07);
      border-top:1px solid rgba(255,226,170,.25);
      display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:6px;
    }
    .nav-btn{min-height:54px;border-radius:14px;background:#2c180b;color:#f1d39e;border:1px solid rgba(255,226,170,.18);font-size:11px;font-weight:950}
    .nav-btn.active{background:#b9822e;color:#1e1208}
    .empty{padding:12px;border:1px dashed rgba(36,20,7,.25);border-radius:14px;background:#fff8ea;color:#6b5132;font-weight:850;text-align:center}
    details{border:1px solid rgba(36,20,7,.18);border-radius:14px;background:rgba(255,248,234,.65);padding:8px}
    summary{font-weight:950;color:#4b3015}
    @media(min-width:900px){
      .app{grid-template-columns:360px minmax(0,1fr);align-items:start}
      .topbar{grid-column:1/-1}
      .screen.active{display:grid}
      .screen#screen-table.active{grid-template-columns:360px minmax(0,1fr)}
      .screen:not(#screen-table).active{grid-column:1/-1}
      .bottom-nav{max-width:520px;left:50%;transform:translateX(-50%);border-radius:20px 20px 0 0}
    }
    @media(max-width:480px){
      .app{padding:8px}
      .brand-row{grid-template-columns:1fr}
      .auth{grid-template-columns:1fr}
      .status-grid{grid-template-columns:repeat(2,1fr)}
      .quick-actions{grid-template-columns:1fr 1fr}
      .entity-actions{grid-template-columns:1fr 1fr}
      .edit-grid{grid-template-columns:1fr}
      .hp-actions{grid-template-columns:repeat(2,1fr)}
      .toolbar{grid-template-columns:1fr 1fr}
      .toolbar input{grid-column:1/-1}
    }
  </style>
</head>
<body class="tema-maritimo-sombrio">
  <main class="app">
    <section class="topbar">
      <div class="brand-row">
        <div class="brand">
          <h1>Mesa do Mestre</h1>
          <small>V46 · regras do Guia do Mestre indexadas · tela de comando para sessão, turno, PV e condições</small>
        </div>
        <button class="btn ghost small" onclick="location.href='./?v=48'">Ficha</button>
      </div>
      <div class="auth">
        <input id="masterPassword" type="password" autocomplete="current-password" placeholder="Senha da mesa">
        <button class="btn primary" id="loadBtn">Carregar mesa</button>
      </div>
    </section>

    <section class="screen active" id="screen-table">
      <div class="panel now-card">
        <div class="now-title">Agora na mesa</div>
        <div id="nowBox">
          <div class="empty">Carregue a mesa e selecione alguém.</div>
        </div>
        <div class="quick-actions">
          <button class="btn blue" id="prevTurnBtn">◀ Turno</button>
          <button class="btn blue" id="nextTurnBtn">Turno ▶</button>
          <button class="btn ghost" id="resetRoundBtn">Nova rodada</button>
          <button class="btn green" id="saveSelectedBtn">Salvar selecionado</button>
        </div>
      </div>

      <div class="panel">
        <div class="toolbar">
          <input id="searchInput" placeholder="Buscar jogador, inimigo, NPC...">
          <select id="typeFilter">
            <option value="">Todos</option>
            <option value="player">Jogadores</option>
            <option value="enemy">Inimigos</option>
            <option value="npc">NPCs</option>
          </select>
          <select id="hpFilter">
            <option value="">PV</option>
            <option value="low">Baixo</option>
            <option value="dead">Caído</option>
          </select>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0">
          <span class="pill" id="countPlayers">PJ 0</span>
          <span class="pill" id="countEnemies">Inimigos 0</span>
          <span class="pill" id="countNpcs">NPCs 0</span>
          <span class="pill" id="roundBadge">Rodada 1</span>
        </div>
        <div class="list" id="entityList"></div>
      </div>

      <div class="panel" id="detailPanel">
        <div id="detailBox" class="empty">Selecione um jogador, inimigo ou NPC.</div>
      </div>
    </section>

    <section class="screen" id="screen-players">
      <div class="panel">
        <h2>Jogadores</h2>
        <div class="list" id="playerList"></div>
      </div>
    </section>

    <section class="screen" id="screen-combat">
      <div class="panel">
        <h2>Ordem de Turno</h2>
        <div class="quick-actions" style="margin-bottom:8px">
          <button class="btn blue" id="prevTurnBtn2">◀ Anterior</button>
          <button class="btn blue" id="nextTurnBtn2">Próximo ▶</button>
        </div>
        <div class="turn-list" id="turnList"></div>
      </div>
    </section>

    <section class="screen" id="screen-npcs">
      <div class="panel">
        <h2>Inimigos e NPCs</h2>
        <div class="quick-actions" style="margin-bottom:8px">
          <button class="btn red" id="addEnemyBtn">+ Inimigo</button>
          <button class="btn blue" id="addNpcBtn">+ NPC</button>
        </div>
        <div class="list" id="localList"></div>
      </div>
    </section>

    <section class="screen" id="screen-notes">
      <div class="panel">
        <h2>Notas rápidas do Mestre</h2>
        <div class="field">
          <label>Nota da sessão</label>
          <textarea id="sessionNotes" rows="10" placeholder="Anote pistas, decisões, tesouros, estado da cena..."></textarea>
        </div>
        <button class="btn primary" id="saveNotesBtn">Salvar notas</button>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-screen="screen-table">Mesa</button>
    <button class="nav-btn" data-screen="screen-players">PJs</button>
    <button class="nav-btn" data-screen="screen-combat">Turnos</button>
    <button class="nav-btn" data-screen="screen-npcs">NPCs</button>
    <button class="nav-btn" data-screen="screen-notes">Notas</button>
  </nav>

  <div id="toast" style="position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:#1d1008;color:#ffe4b8;border:1px solid #d09a50;border-radius:999px;padding:9px 13px;font-weight:950;opacity:0;pointer-events:none;transition:.2s;z-index:50"></div>

<script>
const API_BASE = location.origin;
const CAMPAIGN_ID = 'ghosts-of-saltmarsh';
const PASS_KEY = 'rpggabriel.master.password.v45';
const ENEMY_KEY = 'rpggabriel.master.enemies.v45';
const NPC_KEY = 'rpggabriel.master.npcs.v45';
const TURN_KEY = 'rpggabriel.master.turn.v45';
const NOTES_KEY = 'rpggabriel.master.notes.v45';
const CONDITIONS = ['Caído','Envenenado','Concentrando','Invisível','Atordoado','Agarrado','Assustado'];
const state = {players:[], enemies:loadLocal(ENEMY_KEY,[]), npcs:loadLocal(NPC_KEY,[]), selectedType:'', selectedId:'', round:1, turnIndex:0};

function $(s,r=document){return r.querySelector(s)}
function $all(s,r=document){return Array.from(r.querySelectorAll(s))}
function esc(v){return String(v??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]))}
function num(v){const n=Number(v);return Number.isFinite(n)?n:0}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function uid(p){return p+'_'+Math.random().toString(36).slice(2,9)}
function loadLocal(k,f){try{return JSON.parse(localStorage.getItem(k)||JSON.stringify(f))}catch{return f}}
function saveLocal(k,v){localStorage.setItem(k,JSON.stringify(v))}
function toast(msg){const el=$('#toast');el.textContent=msg;el.style.opacity='1';clearTimeout(window.__toast);window.__toast=setTimeout(()=>el.style.opacity='0',2400)}

function password(){return $('#masterPassword').value.trim() || localStorage.getItem(PASS_KEY) || ''}
function savePassword(){if($('#masterPassword').value.trim())localStorage.setItem(PASS_KEY,$('#masterPassword').value.trim())}
function deepMerge(a,b){if(Array.isArray(a))return Array.isArray(b)?b:a;if(a&&typeof a==='object'){const o={...a};if(b&&typeof b==='object')Object.keys(b).forEach(k=>o[k]=deepMerge(a[k],b[k]));return o}return b!==undefined?b:a}
function blankPlayer(){return {id:'',meta:{nomePersonagem:'',classe:'',classeNivel:'',nivel:1,raca:'',nomeJogador:''},vida:{atuais:0,maximos:0,temporarios:0},combate:{classeArmadura:'',iniciativa:'',deslocamento:''},atributos:{},pericias:{},proficiencia:{bonus:2},bonusProficiencia:2,campanha:{corrupcao:0,faccao:'',pistasDecifradas:'',pressagioCurto:''},magia:{truques:[],niveis:{},grimorio:[]},descricao:{aparenciaImagem:'',historia:''},condicoes:[]}}
function normalizePlayer(c){const p=deepMerge(blankPlayer(),c||{});p.id=(c&&c.id)||p.id;if(!p.meta.classe&&p.meta.classeNivel)p.meta.classe=String(p.meta.classeNivel).replace(/\bn[ií]vel\b.*$/i,'').replace(/\d+/g,'').replace(/[—-]/g,'').trim();if(!p.meta.nivel){const m=String(p.meta.classeNivel||'').match(/\b(1[0-9]|20|[1-9])\b/);p.meta.nivel=m?num(m[1]):1}p.condicoes=Array.isArray(p.condicoes)?p.condicoes:[];p.magia.grimorio=Array.isArray(p.magia.grimorio)?p.magia.grimorio:[];p.magia.truques=Array.isArray(p.magia.truques)?p.magia.truques:[];p.magia.niveis=p.magia.niveis||{};return p}
function baseLocal(type){return {id:uid(type),name:type==='enemy'?'Novo inimigo':'Novo NPC',role:'',hp:10,hpMax:10,ac:10,initiative:0,conditions:[],notes:'',image:'',spells:[]}}

function all(){return [...state.players.map(data=>({type:'player',data})),...state.enemies.map(data=>({type:'enemy',data})),...state.npcs.map(data=>({type:'npc',data}))]}
function arr(type){return type==='player'?state.players:(type==='enemy'?state.enemies:state.npcs)}
function find(type,id){return arr(type).find(x=>String(x.id)===String(id))||null}
function selected(){return find(state.selectedType,state.selectedId)}
function nameOf(type,e){return type==='player'?(e.meta.nomePersonagem||'Sem nome'):(e.name||'Sem nome')}
function subOf(type,e){return type==='player'?([e.meta.classe||e.meta.classeNivel,'Nv. '+levelOf(e),e.meta.raca].filter(Boolean).join(' • ')):[type==='enemy'?'Inimigo':'NPC',e.role].filter(Boolean).join(' • ')}
function levelOf(p){const d=num(p.meta.nivel);if(d>0)return d;const m=String(p.meta.classeNivel||'').match(/\d+/);return m?num(m[0]):1}
function hpOf(type,e){return type==='player'?{now:num(e.vida.atuais),max:num(e.vida.maximos),temp:num(e.vida.temporarios)}:{now:num(e.hp),max:num(e.hpMax),temp:0}}
function acOf(type,e){return type==='player'?(e.combate.classeArmadura||'-'):(e.ac||'-')}
function iniOf(type,e){return type==='player'?num(e.combate.iniciativa):num(e.initiative)}
function condOf(type,e){return type==='player'?(Array.isArray(e.condicoes)?e.condicoes:[]):(Array.isArray(e.conditions)?e.conditions:[])}
function setCond(type,e,cond,on){const key=type==='player'?'condicoes':'conditions';e[key]=Array.isArray(e[key])?e[key]:[];if(on&&!e[key].includes(cond))e[key].push(cond);if(!on)e[key]=e[key].filter(x=>x!==cond)}
function hpState(type,e){const h=hpOf(type,e);if(h.now<=0)return'dead';if(h.max&&h.now/h.max<=.35)return'low';return'ok'}
function spellsOf(p){const out=[];(p.magia.grimorio||[]).forEach(s=>{const n=s.nome_pt||s.nome||s.name;if(n)out.push({name:n,level:s.nivel===0?'Truque':(s.nivel||'?')+'º'})});(p.magia.truques||[]).forEach(s=>{if(s&&s.nome)out.push({name:s.nome,level:'Truque'})});for(let i=1;i<=9;i++){const sec=p.magia.niveis&&p.magia.niveis[i];const list=sec&&Array.isArray(sec.magias)?sec.magias:[];list.forEach(s=>{if(s&&s.nome)out.push({name:s.nome,level:i+'º'})})}return out}
function attrMod(score){const v=Number(score);return Math.floor(((Number.isFinite(v)?v:10)-10)/2)}
function passive(p){const wis=num(p.atributos?.sabedoria?.valor||10);const prof=num(p.proficiencia?.bonus||p.bonusProficiencia||0);return 10+attrMod(wis)+(p.pericias?.percepcao?.proficiente?prof:0)}

async function apiFetch(path,options={}){
  const pwd=password();if(!pwd)throw new Error('Digite a senha da mesa.');
  localStorage.setItem(PASS_KEY,pwd);
  const headers={'Content-Type':'application/json','x-rpg-password':pwd,'x-campaign-id':CAMPAIGN_ID,'x-player-id':'mestre'};
  const res=await fetch(API_BASE+path,{...options,headers:{...headers,...(options.headers||{})}});
  const txt=await res.text();let data={};try{data=txt?JSON.parse(txt):{}}catch{data={ok:false,error:txt}}
  if(!res.ok||data.ok===false)throw new Error(data.error||('Erro HTTP '+res.status));
  return data;
}
async function loadPlayers(){
  try{
    $('#loadBtn').disabled=true;savePassword();
    const listData=await apiFetch('/api/characters?campaignId='+encodeURIComponent(CAMPAIGN_ID),{method:'GET'});
    const list=Array.isArray(listData.characters)?listData.characters:[];
    const full=[];
    for(const item of list){
      const id=item.id||item.characterId;if(!id)continue;
      try{const detail=await apiFetch('/api/characters/'+encodeURIComponent(id)+'?campaignId='+encodeURIComponent(CAMPAIGN_ID),{method:'GET'});full.push(normalizePlayer(detail.character||item))}
      catch{full.push(normalizePlayer(item))}
    }
    state.players=full.sort((a,b)=>nameOf('player',a).localeCompare(nameOf('player',b),'pt-BR'));
    ensureSelection();renderAll();toast('Mesa carregada.');
  }catch(e){toast(e.message)}
  finally{$('#loadBtn').disabled=false}
}
async function savePlayer(p,msg){
  p.updatedAt=new Date().toISOString();
  await apiFetch('/api/characters/'+encodeURIComponent(p.id),{method:'PUT',body:JSON.stringify({character:p,campaignId:CAMPAIGN_ID})});
  renderAll();toast(msg||'Personagem salvo.');
}
function saveBoards(){saveLocal(ENEMY_KEY,state.enemies);saveLocal(NPC_KEY,state.npcs)}
function saveEntity(type,e,msg){if(type==='player')return savePlayer(e,msg);saveBoards();renderAll();toast(msg||'Salvo localmente.')}

function order(){return all().sort((a,b)=>iniOf(b.type,b.data)-iniOf(a.type,a.data)||nameOf(a.type,a.data).localeCompare(nameOf(b.type,b.data),'pt-BR'))}
function activeTurn(){const o=order();if(!o.length)return null;state.turnIndex=clamp(state.turnIndex,0,o.length-1);return o[state.turnIndex]}
function persistTurn(){saveLocal(TURN_KEY,{round:state.round,turnIndex:state.turnIndex})}
function restoreTurn(){const t=loadLocal(TURN_KEY,{round:1,turnIndex:0});state.round=t.round||1;state.turnIndex=t.turnIndex||0}
function nextTurn(){const o=order();if(!o.length)return;state.turnIndex++;if(state.turnIndex>=o.length){state.turnIndex=0;state.round++}const a=activeTurn();if(a)select(a.type,a.data.id);persistTurn();renderAll()}
function prevTurn(){const o=order();if(!o.length)return;state.turnIndex--;if(state.turnIndex<0){state.turnIndex=Math.max(0,o.length-1);state.round=Math.max(1,state.round-1)}const a=activeTurn();if(a)select(a.type,a.data.id);persistTurn();renderAll()}
function resetRound(){state.round++;state.turnIndex=0;persistTurn();renderAll()}
function select(type,id){state.selectedType=type;state.selectedId=id;renderAll()}
function ensureSelection(){if(selected())return;const a=activeTurn();if(a){state.selectedType=a.type;state.selectedId=a.data.id;return}const f=all()[0];if(f){state.selectedType=f.type;state.selectedId=f.data.id}}

function visible(){
  const q=String($('#searchInput')?.value||'').toLowerCase().trim();
  const tf=$('#typeFilter')?.value||'';const hf=$('#hpFilter')?.value||'';
  return all().filter(it=>{
    if(tf&&it.type!==tf)return false;
    const e=it.data;const hps=hpState(it.type,e);
    if(hf&&hps!==hf)return false;
    const text=[nameOf(it.type,e),subOf(it.type,e),it.type==='player'?e.meta.nomeJogador:'',it.type==='player'?e.campanha.faccao:e.role].join(' ').toLowerCase();
    return !q||text.includes(q);
  });
}
function hpBar(type,e){const h=hpOf(type,e);const pct=h.max?clamp(h.now/h.max*100,0,100):0;const st=hpState(type,e);return `<div class="hpbar"><span>PV</span><div class="track"><div class="fill ${st==='dead'?'dead':st==='low'?'low':''}" style="width:${pct}%"></div></div><b>${h.now}/${h.max||0}</b></div>`}
function entityCard(type,e){
  const active=state.selectedType===type&&String(state.selectedId)===String(e.id);
  const st=hpState(type,e);const img=type==='player'?e.descricao?.aparenciaImagem:e.image;
  return `<article class="entity-card ${active?'active':''} ${st}" data-select-type="${type}" data-select-id="${esc(e.id)}">
    <div class="entity-top">
      <div class="avatar">${img?`<img src="${esc(img)}">`:'Sem imagem'}</div>
      <div><div class="entity-name">${esc(nameOf(type,e))}</div><div class="entity-sub">${esc(subOf(type,e))}</div></div>
      <span class="pill">${type==='player'?'PJ':type==='enemy'?'MON':'NPC'}</span>
    </div>
    ${hpBar(type,e)}
    <div class="entity-mini">
      <span class="pill">CA ${esc(acOf(type,e))}</span>
      <span class="pill">INI ${iniOf(type,e)}</span>
      ${type==='player'?`<span class="pill">Pass. ${passive(e)}</span>`:''}
      ${condOf(type,e).map(c=>`<span class="pill">${esc(c)}</span>`).join('')}
    </div>
    <div class="entity-actions">
      <button class="btn small green" data-hp-delta="1" data-type="${type}" data-id="${esc(e.id)}">+1</button>
      <button class="btn small green" data-hp-delta="5" data-type="${type}" data-id="${esc(e.id)}">+5</button>
      <button class="btn small red" data-hp-delta="-1" data-type="${type}" data-id="${esc(e.id)}">-1</button>
      <button class="btn small red" data-hp-delta="-5" data-type="${type}" data-id="${esc(e.id)}">-5</button>
    </div>
  </article>`;
}
function renderNow(){
  const current=activeTurn();const sel=selected();const type=sel?state.selectedType:(current?current.type:'');const e=sel||(current?current.data:null);
  if(!e){$('#nowBox').innerHTML='<div class="empty">Carregue a mesa e selecione alguém.</div>';return}
  const h=hpOf(type,e);const spells=type==='player'?spellsOf(e).length:0;
  $('#nowBox').innerHTML=`<div class="now-name">${esc(nameOf(type,e))}</div><div class="now-sub">${esc(subOf(type,e))}</div>
  ${hpBar(type,e)}
  <div class="status-grid">
    <div class="stat"><span>CA</span><b>${esc(acOf(type,e))}</b></div>
    <div class="stat"><span>INI</span><b>${iniOf(type,e)}</b></div>
    <div class="stat"><span>Temp</span><b>${h.temp||0}</b></div>
    <div class="stat"><span>Magias</span><b>${spells}</b></div>
  </div>`;
}
function renderLists(){
  $('#countPlayers').textContent='PJ '+state.players.length;
  $('#countEnemies').textContent='Inimigos '+state.enemies.length;
  $('#countNpcs').textContent='NPCs '+state.npcs.length;
  $('#roundBadge').textContent='Rodada '+state.round;
  $('#entityList').innerHTML=visible().map(it=>entityCard(it.type,it.data)).join('')||'<div class="empty">Nada encontrado.</div>';
  $('#playerList').innerHTML=state.players.map(p=>entityCard('player',p)).join('')||'<div class="empty">Nenhum jogador carregado.</div>';
  $('#localList').innerHTML=[...state.enemies.map(e=>entityCard('enemy',e)),...state.npcs.map(e=>entityCard('npc',e))].join('')||'<div class="empty">Nenhum inimigo/NPC criado.</div>';
}
function renderTurnList(){
  const o=order();$('#roundBadge').textContent='Rodada '+state.round;
  $('#turnList').innerHTML=o.map((it,i)=>`<div class="turn-item ${i===state.turnIndex?'active':''}" data-select-type="${it.type}" data-select-id="${esc(it.data.id)}">
    <div class="turn-rank">${i+1}</div><div><b>${esc(nameOf(it.type,it.data))}</b><div class="entity-sub">${esc(subOf(it.type,it.data))}</div></div><b>${iniOf(it.type,it.data)}</b>
  </div>`).join('')||'<div class="empty">Sem ordem de turno.</div>';
}
function renderDetail(){
  const e=selected();const type=state.selectedType;
  if(!e){$('#detailBox').innerHTML='<div class="empty">Selecione um jogador, inimigo ou NPC.</div>';return}
  const h=hpOf(type,e);const cond=condOf(type,e);const img=type==='player'?e.descricao?.aparenciaImagem:e.image;const spells=type==='player'?spellsOf(e):[];
  $('#detailBox').innerHTML=`<div class="detail-grid">
    <div class="detail-head">
      <div class="avatar">${img?`<img src="${esc(img)}">`:'Sem imagem'}</div>
      <div><div class="detail-name">${esc(nameOf(type,e))}</div><div class="detail-sub">${esc(subOf(type,e))}</div></div>
    </div>
    ${hpBar(type,e)}
    <div class="hp-actions">
      <button class="btn green" data-hp-delta="10" data-type="${type}" data-id="${esc(e.id)}">Curar 10</button>
      <button class="btn green" data-hp-delta="1" data-type="${type}" data-id="${esc(e.id)}">Curar 1</button>
      <button class="btn red" data-hp-delta="-1" data-type="${type}" data-id="${esc(e.id)}">Dano 1</button>
      <button class="btn red" data-hp-delta="-10" data-type="${type}" data-id="${esc(e.id)}">Dano 10</button>
    </div>
    <div class="edit-grid">
      <div class="field"><label>PV atual</label><input data-edit="hp-now" value="${h.now}"></div>
      <div class="field"><label>PV máximo</label><input data-edit="hp-max" value="${h.max}"></div>
      <div class="field"><label>CA</label><input data-edit="ac" value="${esc(acOf(type,e))}"></div>
      <div class="field"><label>Iniciativa</label><input data-edit="initiative" value="${iniOf(type,e)}"></div>
    </div>
    <div><label class="field"><span style="display:block;font-size:11px;text-transform:uppercase;color:#674b2b;font-weight:950;margin-bottom:4px">Condições</span></label><div class="conditions">${CONDITIONS.map(c=>`<button class="cond ${cond.includes(c)?'active':''}" data-condition="${esc(c)}">${esc(c)}</button>`).join('')}</div></div>
    ${type==='player'?`<details open><summary>Magias e recursos visíveis</summary><div class="spell-list">${spells.slice(0,60).map(s=>`<div class="spell"><b>${esc(s.name)}</b><span class="pill">${esc(s.level)}</span></div>`).join('')||'<div class="empty">Sem magias visíveis.</div>'}</div></details>`:''}
    <div class="field"><label>Notas do mestre para este alvo</label><textarea data-edit="notes" rows="4">${esc(type==='player'?(e.campanha.pressagioCurto||''):(e.notes||''))}</textarea></div>
    <button class="btn primary" data-save-detail="1">Salvar alterações</button>
  </div>`;
}
function renderAll(){ensureSelection();renderNow();renderLists();renderTurnList();renderDetail();}

function updateHp(type,id,delta){
  const e=find(type,id);if(!e)return;
  if(type==='player'){e.vida.atuais=clamp(num(e.vida.atuais)+delta,0,Math.max(num(e.vida.maximos),num(e.vida.atuais)+delta));savePlayer(e,delta<0?'Dano aplicado.':'Cura aplicada.')}
  else{e.hp=clamp(num(e.hp)+delta,0,Math.max(num(e.hpMax),num(e.hp)+delta));saveEntity(type,e,delta<0?'Dano aplicado.':'Cura aplicada.')}
}
function saveDetail(){
  const e=selected();const type=state.selectedType;if(!e)return;
  const now=num($('[data-edit="hp-now"]')?.value);const max=num($('[data-edit="hp-max"]')?.value);const ac=$('[data-edit="ac"]')?.value||'';const ini=num($('[data-edit="initiative"]')?.value);const notes=$('[data-edit="notes"]')?.value||'';
  if(type==='player'){e.vida.atuais=now;e.vida.maximos=max;e.combate.classeArmadura=ac;e.combate.iniciativa=ini;e.campanha.pressagioCurto=notes;savePlayer(e,'Jogador atualizado.')}
  else{e.hp=now;e.hpMax=max;e.ac=ac;e.initiative=ini;e.notes=notes;saveEntity(type,e,'Atualizado.')}
}
function toggleCondition(cond){
  const e=selected();const type=state.selectedType;if(!e)return;
  setCond(type,e,cond,!condOf(type,e).includes(cond));
  if(type==='player')savePlayer(e,'Condição atualizada.');else saveEntity(type,e,'Condição atualizada.');
}
function addLocal(type){
  const e=baseLocal(type);if(type==='enemy')state.enemies.push(e);else state.npcs.push(e);
  saveBoards();select(type,e.id);renderAll();toast(type==='enemy'?'Inimigo criado.':'NPC criado.');
}
function removeSelected(){
  const e=selected();const type=state.selectedType;if(!e||type==='player'){toast('Remoção só para inimigos/NPCs locais.');return}
  if(type==='enemy')state.enemies=state.enemies.filter(x=>x.id!==e.id);else state.npcs=state.npcs.filter(x=>x.id!==e.id);
  state.selectedType='';state.selectedId='';saveBoards();renderAll();toast('Removido.');
}

function bind(){
  $('#masterPassword').value=localStorage.getItem(PASS_KEY)||'';
  $('#sessionNotes').value=localStorage.getItem(NOTES_KEY)||'';
  $('#loadBtn').onclick=loadPlayers;
  $('#nextTurnBtn').onclick=$('#nextTurnBtn2').onclick=nextTurn;
  $('#prevTurnBtn').onclick=$('#prevTurnBtn2').onclick=prevTurn;
  $('#resetRoundBtn').onclick=resetRound;
  $('#saveSelectedBtn').onclick=()=>{const e=selected();if(e)saveEntity(state.selectedType,e,'Salvo.')};
  $('#addEnemyBtn').onclick=()=>addLocal('enemy');
  $('#addNpcBtn').onclick=()=>addLocal('npc');
  $('#saveNotesBtn').onclick=()=>{localStorage.setItem(NOTES_KEY,$('#sessionNotes').value);toast('Notas salvas.')};
  $('#searchInput').oninput=renderLists;$('#typeFilter').onchange=renderLists;$('#hpFilter').onchange=renderLists;
  $all('.nav-btn').forEach(btn=>btn.onclick=()=>{$all('.nav-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');$all('.screen').forEach(s=>s.classList.remove('active'));$('#'+btn.dataset.screen).classList.add('active');renderAll()});
  document.addEventListener('click',e=>{
    const sel=e.target.closest('[data-select-type]');if(sel){select(sel.dataset.selectType,sel.dataset.selectId);return}
    const hp=e.target.closest('[data-hp-delta]');if(hp){updateHp(hp.dataset.type,hp.dataset.id,num(hp.dataset.hpDelta));return}
    const cond=e.target.closest('[data-condition]');if(cond){toggleCondition(cond.dataset.condition);return}
    const save=e.target.closest('[data-save-detail]');if(save){saveDetail();return}
  });
}
restoreTurn();bind();renderAll();
</script>
</body>
</html>
