<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Página do Mestre - RPG Gabriel V14</title>
  <style>
    :root{
      --bg:#080b10;
      --panel:#101722;
      --panel2:#172130;
      --paper:#fff7e8;
      --ink:#241b14;
      --muted:#9ca8b8;
      --line:#2c3a4d;
      --gold:#d8bd8b;
      --red:#d43b32;
      --green:#2f8b57;
      --blue:#3f7fc8;
      --purple:#8a35b2;
      --radius:16px;
      --ui:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:linear-gradient(180deg,#070a0f,#111722);color:#eef3f7;font-family:var(--ui)}
    button,input,textarea,select{font:inherit}
    button{cursor:pointer}
    a{color:inherit}
    .wrap{max-width:1440px;margin:0 auto;padding:16px}
    .top{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-bottom:14px}
    h1{margin:0;font-size:30px;line-height:1}
    .subtitle{color:#c9d3df;margin-top:5px}
    .login{display:grid;grid-template-columns:260px auto auto;gap:8px;align-items:end;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:14px}
    label{display:block;font-size:11px;text-transform:uppercase;font-weight:900;letter-spacing:.05em;color:#cfd7e1;margin-bottom:4px}
    input,textarea,select{width:100%;border:1px solid #34465f;background:#0c121b;color:#fff;border-radius:10px;padding:9px 10px;outline:none}
    textarea{resize:vertical;min-height:88px}
    .btn{border:0;border-radius:11px;background:#7c4826;color:#fff4dc;font-weight:900;min-height:38px;padding:9px 12px}
    .btn.secondary{background:#263449}
    .btn.green{background:var(--green)}
    .btn.red{background:#9f2e2e}
    .btn.blue{background:#2f68b3}
    .btn.small{min-height:30px;padding:6px 9px;font-size:12px}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:14px;align-items:start}
    .sidebar,.main-card,.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px}
    .summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
    .summary .box{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:12px}
    .summary b{display:block;font-size:24px}
    .summary span{color:#c9d3df;font-size:12px;text-transform:uppercase;font-weight:850}
    .char-list{display:grid;gap:8px;max-height:calc(100vh - 250px);overflow:auto;padding-right:4px}
    .char-btn{width:100%;text-align:left;background:#111b28;border:1px solid #33445c;color:#eef3f7;border-radius:13px;padding:10px}
    .char-btn.active{border-color:var(--gold);background:#2e2116}
    .char-btn b{display:block;font-size:18px}
    .char-btn span{display:block;color:#c7d1dc;font-size:13px;margin-top:2px}
    .chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
    .chip{border-radius:999px;background:#263449;color:#eaf1f7;font-size:11px;font-weight:850;padding:4px 8px}
    .main-card{display:grid;gap:12px}
    .character-head{display:grid;grid-template-columns:110px 1fr auto;gap:12px;align-items:center}
    .avatar{width:110px;height:110px;border-radius:18px;background:#05070b;border:1px solid #394a61;display:grid;place-items:center;overflow:hidden;color:#c9d3df;text-align:center}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .name{font-size:30px;font-weight:950;line-height:1.05}
    .meta{color:#c9d3df;margin-top:4px}
    .bars{display:grid;gap:8px;margin-top:10px}
    .bar-row{display:grid;grid-template-columns:90px 1fr 70px;gap:8px;align-items:center}
    .bar-label{font-size:12px;text-transform:uppercase;font-weight:950;color:#cbd6e2}
    .bar{height:18px;background:#253247;border-radius:999px;overflow:hidden;border:1px solid #394a61}
    .fill{height:100%;width:0%}
    .fill.hp{background:linear-gradient(90deg,#8f1d1d,#e2493b)}
    .fill.level{background:linear-gradient(90deg,#244f8e,#5b9ce4)}
    .fill.corr{background:linear-gradient(90deg,#3a164d,#9639bf)}
    .bar-value{text-align:right;font-size:12px;font-weight:900}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .card h2{margin:0 0 10px;font-size:18px}
    .mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .stat{background:#111b28;border:1px solid #33445c;border-radius:12px;padding:9px}
    .stat span{display:block;font-size:11px;color:#c9d3df;text-transform:uppercase;font-weight:900}
    .stat b{display:block;font-size:20px;margin-top:3px}
    .actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .action-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;margin-bottom:8px}
    .spell-list{display:grid;gap:6px;max-height:360px;overflow:auto}
    .spell{background:#111b28;border:1px solid #33445c;border-radius:10px;padding:8px}
    .spell b{display:block}
    .spell small{color:#c9d3df}
    .table{width:100%;border-collapse:collapse;font-size:13px}
    .table th,.table td{border-bottom:1px solid #2c3a4d;padding:7px;text-align:left;vertical-align:top}
    .table th{color:#cbd6e2;text-transform:uppercase;font-size:11px}
    .notes{white-space:pre-wrap;color:#eaf1f7;line-height:1.35}
    .toast{position:fixed;left:16px;right:16px;bottom:16px;background:#05070b;border:1px solid #44566d;color:#fff;border-radius:14px;padding:13px;text-align:center;opacity:0;transform:translateY(10px);pointer-events:none;transition:.2s;z-index:99}
    .toast.show{opacity:1;transform:none}
    .empty{padding:28px;text-align:center;color:#c9d3df}
    @media(max-width:980px){
      .grid{grid-template-columns:1fr}
      .summary{grid-template-columns:repeat(2,1fr)}
      .cards{grid-template-columns:1fr}
      .login{grid-template-columns:1fr}
      .character-head{grid-template-columns:80px 1fr}
      .character-head .head-actions{grid-column:1/-1}
      .avatar{width:80px;height:80px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Página do Mestre</h1>
        <div class="subtitle">Controle de personagens, vida, corrupção, nível, magias e informações rápidas da mesa.</div>
      </div>
      <a class="btn secondary" href="/?v=14">Abrir ficha do jogador</a>
    </div>

    <section class="login">
      <div>
        <label>Senha da mesa</label>
        <input id="masterPassword" type="password" placeholder="Senha da mesa">
      </div>
      <button class="btn" id="loadBtn">Carregar personagens</button>
      <button class="btn secondary" id="refreshBtn">Atualizar</button>
    </section>

    <section class="summary">
      <div class="box"><b id="sumChars">0</b><span>Personagens</span></div>
      <div class="box"><b id="sumLowHp">0</b><span>Vida baixa</span></div>
      <div class="box"><b id="sumCorr">0</b><span>Corrupção alta</span></div>
      <div class="box"><b id="sumSpells">0</b><span>Magias listadas</span></div>
    </section>

    <div class="grid">
      <aside class="sidebar">
        <h2 style="margin:0 0 10px">Mesa</h2>
        <div class="char-list" id="charList"></div>
      </aside>

      <main class="main-card" id="detail">
        <div class="empty">Digite a senha da mesa e carregue os personagens.</div>
      </main>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = location.origin;
    const CAMPAIGN_ID = 'ghosts-of-saltmarsh';
    const PASS_KEY = 'rpggabriel.master.password';

    const state = { characters: [], selectedId: null };

    function $(s,r=document){ return r.querySelector(s); }
    function $all(s,r=document){ return Array.from(r.querySelectorAll(s)); }
    function num(v){ const n=Number(v); return Number.isFinite(n)?n:0; }
    function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
    function escapeHtml(s){ return String(s ?? '').replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
    function toast(msg){ const el=$('#toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),2600); }
    function getByPath(obj,path){ return String(path).split('.').reduce((a,k)=>a==null?undefined:a[k], obj); }
    function setByPath(obj,path,value){
      const parts=String(path).split('.');
      let cur=obj;
      for(let i=0;i<parts.length-1;i++){
        if(cur[parts[i]] == null || typeof cur[parts[i]] !== 'object') cur[parts[i]] = {};
        cur=cur[parts[i]];
      }
      cur[parts.at(-1)] = value;
    }
    function selected(){ return state.characters.find(c=>c.id===state.selectedId) || state.characters[0] || null; }
    function password(){ return $('#masterPassword').value.trim() || sessionStorage.getItem(PASS_KEY) || localStorage.getItem(PASS_KEY) || ''; }

    async function apiFetch(path, options={}){
      const pwd=password();
      if(!pwd) throw new Error('Digite a senha da mesa.');
      sessionStorage.setItem(PASS_KEY,pwd);
      localStorage.setItem(PASS_KEY,pwd);
      const headers = {'Content-Type':'application/json','x-rpg-password':pwd,'x-campaign-id':CAMPAIGN_ID,'x-player-id':'mestre'};
      const res = await fetch(API_BASE + path, {...options, headers:{...headers,...(options.headers||{})}});
      const txt = await res.text();
      let data=null;
      try{ data=txt?JSON.parse(txt):null; }catch{ data={raw:txt}; }
      if(!res.ok) throw new Error((data && (data.error||data.message)) || 'HTTP '+res.status);
      return data;
    }

    function normalize(c){
      c = c || {};
      c.meta = c.meta || {};
      c.vida = c.vida || {};
      c.combate = c.combate || {};
      c.campanha = c.campanha || {};
      c.descricao = c.descricao || {};
      c.magia = c.magia || {};
      c.magia.truques = c.magia.truques || [];
      c.magia.niveis = c.magia.niveis || {};
      return c;
    }

    async function loadCharacters(){
      try{
        $('#loadBtn').disabled = true;
        const listData = await apiFetch('/api/characters?campaignId='+encodeURIComponent(CAMPAIGN_ID), {method:'GET'});
        const list = Array.isArray(listData.characters) ? listData.characters : [];
        const full = [];

        for(const item of list){
          const id = item.id || item.characterId;
          if(!id) continue;
          try{
            const detail = await apiFetch('/api/characters/'+encodeURIComponent(id)+'?campaignId='+encodeURIComponent(CAMPAIGN_ID), {method:'GET'});
            if(detail.character) full.push(normalize(detail.character));
          }catch(e){
            full.push(normalize(item));
          }
        }

        state.characters = full;
        if(!state.selectedId && full[0]) state.selectedId = full[0].id;
        if(state.selectedId && !full.some(c=>c.id===state.selectedId) && full[0]) state.selectedId = full[0].id;

        renderAll();
        toast('Personagens carregados.');
      }catch(e){
        toast(e.message);
      }finally{
        $('#loadBtn').disabled = false;
      }
    }

    async function saveCharacter(c, msg='Atualizado online.'){
      c.updatedAt = new Date().toISOString();
      await apiFetch('/api/characters/'+encodeURIComponent(c.id), {
        method:'PUT',
        body: JSON.stringify({character:c,campaignId:CAMPAIGN_ID})
      });
      renderAll();
      toast(msg);
    }

    function getLevel(c){
      const direct = num(c.meta.nivel);
      if(direct > 0) return direct;
      const m = String(c.meta.classeNivel || '').match(/(\d+)/);
      return m ? num(m[1]) : 1;
    }

    function spellNames(c){
      const out=[];
      (c.magia.truques || []).forEach(s=>{ if(s && s.nome) out.push({level:'Truque', name:s.nome, prepared:true}); });
      for(let i=1;i<=9;i++){
        const sec = c.magia.niveis && c.magia.niveis[i];
        const arr = sec && Array.isArray(sec.magias) ? sec.magias : [];
        arr.forEach(s=>{ if(s && s.nome) out.push({level:'Círculo '+i, name:s.nome, prepared:!!s.preparada}); });
      }
      return out;
    }

    function subtitle(c){
      return [c.meta.classeNivel, c.meta.raca, c.campanha.faccao].filter(Boolean).join(' - ') || 'Sem classe definida';
    }

    function renderList(){
      $('#charList').innerHTML = state.characters.map(c=>{
        const hpNow=num(c.vida.atuais), hpMax=num(c.vida.maximos);
        const corr=num(c.campanha.corrupcao);
        const active = c.id===state.selectedId ? 'active' : '';
        return `
          <button class="char-btn ${active}" data-select="${escapeHtml(c.id)}">
            <b>${escapeHtml(c.meta.nomePersonagem || 'Sem nome')}</b>
            <span>${escapeHtml(subtitle(c))}</span>
            <div class="chips">
              <span class="chip">HP ${hpNow}/${hpMax || 0}</span>
              <span class="chip">Nv. ${getLevel(c)}</span>
              <span class="chip">Corr. ${corr}/10</span>
            </div>
          </button>
        `;
      }).join('') || '<div class="empty">Nenhum personagem encontrado.</div>';
    }

    function renderSummary(){
      const chars = state.characters.length;
      let low=0, highCorr=0, spells=0;
      state.characters.forEach(c=>{
        const hpNow=num(c.vida.atuais), hpMax=num(c.vida.maximos);
        if(hpMax && hpNow/hpMax <= .35) low++;
        if(num(c.campanha.corrupcao) >= 6) highCorr++;
        spells += spellNames(c).length;
      });
      $('#sumChars').textContent=chars;
      $('#sumLowHp').textContent=low;
      $('#sumCorr').textContent=highCorr;
      $('#sumSpells').textContent=spells;
    }

    function renderDetail(){
      const c=selected();
      if(!c){
        $('#detail').innerHTML='<div class="empty">Nenhum personagem selecionado.</div>';
        return;
      }
      state.selectedId = c.id;

      const hpNow=num(c.vida.atuais), hpMax=num(c.vida.maximos);
      const hpPct=hpMax ? clamp((hpNow/hpMax)*100,0,100) : 0;
      const level=getLevel(c);
      const corr=clamp(num(c.campanha.corrupcao),0,10);
      const spells=spellNames(c);
      const img=c.descricao.aparenciaImagem;

      $('#detail').innerHTML = `
        <section class="character-head">
          <div class="avatar">${img ? `<img src="${img}" alt="Personagem">` : 'Sem imagem'}</div>
          <div>
            <div class="name">${escapeHtml(c.meta.nomePersonagem || 'Sem nome')}</div>
            <div class="meta">${escapeHtml(subtitle(c))}</div>
            <div class="bars">
              <div class="bar-row"><div class="bar-label">Vida</div><div class="bar"><div class="fill hp" style="width:${hpPct}%"></div></div><div class="bar-value">${hpNow}/${hpMax || 0}</div></div>
              <div class="bar-row"><div class="bar-label">Nível</div><div class="bar"><div class="fill level" style="width:${clamp(level/20*100,0,100)}%"></div></div><div class="bar-value">Nv. ${level}</div></div>
              <div class="bar-row"><div class="bar-label">Corrupção</div><div class="bar"><div class="fill corr" style="width:${clamp(corr/10*100,0,100)}%"></div></div><div class="bar-value">${corr}/10</div></div>
            </div>
          </div>
          <div class="head-actions">
            <button class="btn secondary" id="reloadSelected">Recarregar</button>
          </div>
        </section>

        <section class="card">
          <h2>Controle rápido do mestre</h2>
          <div class="actions">
            <button class="btn red" data-damage="1">Dano -1</button>
            <button class="btn red" data-damage="5">Dano -5</button>
            <button class="btn green" data-heal="1">Cura +1</button>
            <button class="btn green" data-heal="5">Cura +5</button>
          </div>
          <div class="action-row" style="margin-top:10px">
            <input id="customHp" type="number" placeholder="Valor personalizado">
            <button class="btn red" id="customDamage">Dar dano</button>
            <button class="btn green" id="customHeal">Curar</button>
          </div>
          <div class="action-row">
            <input id="setHpValue" type="number" placeholder="Definir vida atual">
            <button class="btn blue" id="setHpBtn">Definir HP</button>
            <button class="btn secondary" id="saveOnlyBtn">Salvar</button>
          </div>
        </section>

        <section class="cards">
          <div class="card">
            <h2>Informações rápidas</h2>
            <div class="mini-grid">
              <div class="stat"><span>CA</span><b>${escapeHtml(c.combate.classeArmadura || '-')}</b></div>
              <div class="stat"><span>Iniciativa</span><b>${escapeHtml(c.combate.iniciativa || '-')}</b></div>
              <div class="stat"><span>Desloc.</span><b>${escapeHtml(c.combate.deslocamento || '-')}</b></div>
              <div class="stat"><span>Maré</span><b>${escapeHtml(c.campanha.mareAtual || '-')}</b></div>
              <div class="stat"><span>Facção</span><b>${escapeHtml(c.campanha.faccao || '-')}</b></div>
              <div class="stat"><span>Segredo</span><b>${escapeHtml(c.campanha.segredoAtivo || '-')}</b></div>
            </div>
          </div>

          <div class="card">
            <h2>Ajustes narrativos</h2>
            <div class="action-row">
              <input id="levelValue" type="number" min="1" max="20" value="${level}">
              <button class="btn secondary" data-level-step="-1">Nível -</button>
              <button class="btn blue" data-level-step="1">Nível +</button>
            </div>
            <div class="action-row">
              <input id="corrValue" type="number" min="0" max="10" value="${corr}">
              <button class="btn secondary" data-corr-step="-1">Corr. -</button>
              <button class="btn blue" data-corr-step="1">Corr. +</button>
            </div>
          </div>
        </section>

        <section class="cards">
          <div class="card">
            <h2>Magias do personagem</h2>
            <div class="spell-list">
              ${spells.map(s=>`<div class="spell"><b>${escapeHtml(s.name)}</b><small>${escapeHtml(s.level)}${s.prepared ? ' - preparada' : ''}</small></div>`).join('') || '<div class="empty">Sem magias cadastradas.</div>'}
            </div>
          </div>

          <div class="card">
            <h2>Campanha e pistas</h2>
            <table class="table">
              <tr><th>Presságio</th><td>${escapeHtml(c.campanha.pressagioCurto || '-')}</td></tr>
              <tr><th>Relíquia</th><td>${escapeHtml(c.campanha.reliquia || '-')}</td></tr>
              <tr><th>Frase-chave</th><td>${escapeHtml(c.campanha.fraseChave || '-')}</td></tr>
              <tr><th>Marcado</th><td>${c.campanha.marcadoPelaMare ? 'Sim' : 'Não'}</td></tr>
              <tr><th>Ouviu Thalassyr</th><td>${c.campanha.ouviuThalassyr ? 'Sim' : 'Não'}</td></tr>
              <tr><th>Viu ritual</th><td>${c.campanha.viuRitual ? 'Sim' : 'Não'}</td></tr>
            </table>
          </div>
        </section>

        <section class="cards">
          <div class="card">
            <h2>Pistas decifradas</h2>
            <div class="notes">${escapeHtml(c.campanha.pistasDecifradas || 'Sem pistas registradas.')}</div>
          </div>
          <div class="card">
            <h2>Notas úteis</h2>
            <div class="notes">${escapeHtml(c.personalidade?.vinculos || c.descricao?.historia || 'Sem notas rápidas.')}</div>
          </div>
        </section>
      `;
    }

    function renderAll(){
      renderSummary();
      renderList();
      renderDetail();
    }

    function changeHp(delta){
      const c=selected(); if(!c) return;
      const max=num(c.vida.maximos);
      let next=num(c.vida.atuais) + delta;
      if(next < 0) next = 0;
      if(max > 0 && next > max) next = max;
      c.vida.atuais = next;
      saveCharacter(c, delta < 0 ? 'Dano aplicado na ficha.' : 'Cura aplicada na ficha.');
    }

    function setHp(value){
      const c=selected(); if(!c) return;
      const max=num(c.vida.maximos);
      let next=num(value);
      if(next < 0) next = 0;
      if(max > 0 && next > max) next = max;
      c.vida.atuais = next;
      saveCharacter(c, 'Vida definida na ficha.');
    }

    function stepLevel(delta){
      const c=selected(); if(!c) return;
      c.meta.nivel = clamp(num(c.meta.nivel || getLevel(c)) + delta, 1, 20);
      saveCharacter(c, 'Nível atualizado.');
    }

    function stepCorr(delta){
      const c=selected(); if(!c) return;
      c.campanha.corrupcao = clamp(num(c.campanha.corrupcao) + delta, 0, 10);
      saveCharacter(c, 'Corrupção atualizada.');
    }

    async function reloadSelected(){
      const c=selected(); if(!c) return;
      try{
        const data=await apiFetch('/api/characters/'+encodeURIComponent(c.id)+'?campaignId='+encodeURIComponent(CAMPAIGN_ID), {method:'GET'});
        if(data.character){
          const fresh=normalize(data.character);
          const idx=state.characters.findIndex(x=>x.id===fresh.id);
          if(idx>=0) state.characters[idx]=fresh;
          else state.characters.push(fresh);
          renderAll();
          toast('Personagem recarregado.');
        }
      }catch(e){ toast(e.message); }
    }

    document.addEventListener('click', e=>{
      const select=e.target.closest('[data-select]');
      if(select){ state.selectedId=select.dataset.select; renderAll(); return; }

      const dmg=e.target.closest('[data-damage]');
      if(dmg){ changeHp(-num(dmg.dataset.damage)); return; }

      const heal=e.target.closest('[data-heal]');
      if(heal){ changeHp(num(heal.dataset.heal)); return; }

      const level=e.target.closest('[data-level-step]');
      if(level){ stepLevel(num(level.dataset.levelStep)); return; }

      const corr=e.target.closest('[data-corr-step]');
      if(corr){ stepCorr(num(corr.dataset.corrStep)); return; }
    });

    document.addEventListener('input', e=>{
      const c=selected(); if(!c) return;
      if(e.target.id === 'levelValue'){
        c.meta.nivel = clamp(num(e.target.value), 1, 20);
        renderSummary();
      }
      if(e.target.id === 'corrValue'){
        c.campanha.corrupcao = clamp(num(e.target.value), 0, 10);
        renderSummary();
      }
    });

    $('#loadBtn').onclick=loadCharacters;
    $('#refreshBtn').onclick=loadCharacters;
    $('#masterPassword').value = localStorage.getItem(PASS_KEY) || '';

    document.addEventListener('click', e=>{
      if(e.target.id === 'customDamage') changeHp(-num($('#customHp').value));
      if(e.target.id === 'customHeal') changeHp(num($('#customHp').value));
      if(e.target.id === 'setHpBtn') setHp($('#setHpValue').value);
      if(e.target.id === 'saveOnlyBtn') saveCharacter(selected(), 'Personagem salvo.');
      if(e.target.id === 'reloadSelected') reloadSelected();
    });

    if($('#masterPassword').value) loadCharacters();
  </script>
</body>
</html>
